name: Build Tauri Desktop

on:
  workflow_dispatch:
  push:
    branches: [main, master]
  pull_request:
    branches: [main, master]

jobs:
  build:
    strategy:
      fail-fast: false
      matrix:
        os: [windows-latest, macos-latest, ubuntu-latest]
    runs-on: ${{ matrix.os }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"
          cache-dependency-path: quantdinger_vue/package-lock.json

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: "pip"
          cache-dependency-path: backend_api_python/requirements.txt

      - name: Set up Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Linux system dependencies
        if: matrix.os == 'ubuntu-latest'
        run: |
          sudo apt-get update
          sudo apt-get install -y libwebkit2gtk-4.1-dev libgtk-3-dev libappindicator3-dev librsvg2-dev patchelf

      - name: Install frontend deps
        working-directory: ./quantdinger_vue
        env:
          HUSKY: 0
        run: |
          npm ci || npm install

      - name: Install backend deps
        working-directory: ./backend_api_python
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Build Python sidecar
        run: |
          python backend_api_python/scripts/build_sidecar.py

      - name: Build Tauri
        working-directory: ./src-tauri
        run: |
          cargo install tauri-cli --locked --version "^2" || true
          if [ "${{ matrix.os }}" = "windows-latest" ]; then
            cargo tauri build --bundles msi
          else
            cargo tauri build
          fi

      - name: Upload bundles
        uses: actions/upload-artifact@v4
        with:
          name: tauri-bundle-${{ matrix.os }}
          path: |
            src-tauri/target/release/bundle/**
