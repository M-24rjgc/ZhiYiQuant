name: Build Tauri Desktop

on:
  workflow_dispatch:
  push:
    branches: [main, master]
  pull_request:
    branches: [main, master]

jobs:
  build:
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: windows-latest
            bundle_args: --bundles msi
          - os: macos-13
            bundle_args: ""
          - os: macos-14
            bundle_args: ""
    runs-on: ${{ matrix.os }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"
          cache-dependency-path: quantdinger_vue/package-lock.json

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: "pip"
          cache-dependency-path: backend_api_python/requirements.txt

      - name: Set up Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Install frontend deps
        working-directory: ./quantdinger_vue
        env:
          HUSKY: 0
        run: |
          npm ci || npm install

      - name: Install backend deps
        working-directory: ./backend_api_python
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Build Python sidecar
        run: |
          python backend_api_python/scripts/build_sidecar.py

      - name: Build Tauri
        working-directory: ./src-tauri
        shell: bash
        run: |
          cargo install tauri-cli --locked --version "^2" || true
          if [ -n "${{ matrix.bundle_args }}" ]; then
            cargo tauri build ${{ matrix.bundle_args }}
          else
            cargo tauri build
          fi

      - name: Upload bundles
        uses: actions/upload-artifact@v4
        with:
          name: tauri-bundle-${{ matrix.os }}
          path: |
            src-tauri/target/release/bundle/**
